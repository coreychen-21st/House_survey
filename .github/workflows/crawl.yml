name: House Survey Crawler

on:
  schedule:
    - cron: '0 9,19 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install --with-deps chromium

      - name: Pre-fetch playwright browsers (warmup)
        run: |
          python -c "
from playwright.sync_api import sync_playwright
with sync_playwright() as p:
    browser = p.chromium.launch(headless=True)
    browser.close()
    print('Playwright warmup OK')
"

      - name: Create data directory and restore DB
        run: |
          mkdir -p data
          echo "Dir listing before:"
          ls -la data/ || true

      - name: Run crawler
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Show DB stats after run
        run: |
          python -c "
import sqlite3
conn = sqlite3.connect('data/listings.db')
total = conn.execute('SELECT COUNT(*) FROM listings').fetchone()[0]
notified = conn.execute('SELECT COUNT(*) FROM listings WHERE is_notified=1').fetchone()[0]
sources = conn.execute(\"SELECT source, COUNT(*) FROM listings GROUP BY source\").fetchall()
print(f'DB stats: total={total}, notified={notified}')
for s, c in sources:
    print(f'  {s}: {c}')
conn.close()
"
